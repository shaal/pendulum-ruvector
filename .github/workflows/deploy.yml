name: Deploy web to Cloudflare Pages

# Builds the Svelte/Vite exhibit and deploys it to the `pendulum-ruvector`
# Cloudflare Pages project on every push to main (i.e. when a PR is merged).
#
# The WebAssembly is pre-built and committed under web/src/wasm/, so CI needs no
# Rust toolchain and does NOT need the RuVector submodule — just Node + Vite.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your account id (Cloudflare dash → Workers & Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=pendulum-ruvector --branch=main
